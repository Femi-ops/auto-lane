<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Auction Concierge – Mock Prototype</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }
    header {
      background: #0a3d62;
      color: white;
      padding: 20px;
      text-align: center;
    }
    .container {
      padding: 20px;
      max-width: 1100px;
      margin: auto;
    }
    .search-box {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    input, button {
      padding: 12px;
      font-size: 16px;
    }
    button {
      background: #0a3d62;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 6px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }
    .card {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }
    .card-body {
      padding: 15px;
    }
    .card-body h3 {
      margin: 0;
      font-size: 20px;
    }
    .price {
      font-weight: bold;
      margin-top: 10px;
      color: #0a3d62;
    }
    .view-btn {
      margin-top: 15px;
      width: 100%;
      padding: 10px;
      background: #1e90ff;
      border: none;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      justify-content: center;
      align-items: center;
    }
    .modal-content {
      background: white;
      padding: 25px;
      width: 90%;
      max-width: 500px;
      border-radius: 10px;
    }
    .close {
      float: right;
      cursor: pointer;
      font-size: 22px;
    }
    .bid-btn {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      background: #27ae60;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 18px;
    }
  </style>
</head>
<body>
<header>
  <h1>Auction Concierge</h1>
  <p>Access Manheim & ACV inventory without a dealer license</p>
</header>
<div class="container">
  <div class="search-box">
    <input id="searchInput" type="text" placeholder="Search make or model…" />
    <button onclick="loadCars()">Search</button>
  </div>
  <div id="carGrid" class="grid"></div>
</div>
<div id="vehicleModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>
    <h2 id="modalTitle"></h2>
    <p id="modalDetails"></p>
    <p id="modalPrice" class="price"></p>
    <button class="bid-btn" onclick="alert('Bid submitted via concierge!')">Place Bid</button>
  </div>
</div>
<script>
  const mockCars = [
    { id: 1, year: 2019, make: "Toyota", model: "Camry SE", mileage: 42000, price: 14500, platform: "Manheim", img: "https://images.pexels.com/photos/358070/pexels-photo-358070.jpeg" },
    { id: 2, year: 2020, make: "Honda", model: "Civic EX", mileage: 31000, price: 15200, platform: "ACV", img: "https://images.pexels.com/photos/210019/pexels-photo-210019.jpeg" },
    { id: 3, year: 2018, make: "BMW", model: "330i", mileage: 52000, price: 19800, platform: "Manheim", img: "https://images.pexels.com/photos/170811/pexels-photo-170811.jpeg" }
  ];
  function loadCars() {
    const query = document.getElementById("searchInput").value.toLowerCase();
    const grid = document.getElementById("carGrid");
    grid.innerHTML = "";
    const results = mockCars.filter(c => c.make.toLowerCase().includes(query) || c.model.toLowerCase().includes(query));
    results.forEach(car => {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `<img src="${car.img}" /><div class="card-body"><h3>${car.year} ${car.make} ${car.model}</h3><p>${car.mileage.toLocaleString()} miles</p><p class="price">$${car.price.toLocaleString()}</p><button class="view-btn" onclick="openModal(${car.id})">View Details</button></div>`;
      grid.appendChild(card);
    });
  }
  function openModal(id) {
    const car = mockCars.find(c => c.id === id);
    document.getElementById("modalTitle").innerText = `${car.year} ${car.make} ${car.model}`;
    document.getElementById("modalDetails").innerText = `Mileage: ${car.mileage.toLocaleString()} miles\nAuction Platform: ${car.platform}`;
    document.getElementById("modalPrice").innerText = `Estimated All-In Price: $${(car.price + 1200).toLocaleString()}`;
    document.getElementById("vehicleModal").style.display = "flex";
  }
  function closeModal() {
    document.getElementById("vehicleModal").style.display = "none";
  }
</script>
</body>
</html>
